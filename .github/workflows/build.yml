name: Build SOPSoft APK
on:
  push:
    branches: [ main, master ] # Cubre ambas posibilidades de rama

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Actualizado a v4

      - name: Setup Java
        uses: actions/setup-java@v4 # Actualizado a v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Setup Python
        uses: actions/setup-python@v5 # Actualizado a v5
        with:
          python-version: '3.10'

      - name: Install Flet
        run: |
          pip install flet

      - name: Build APK
        run: |
          flet build apk

      - name: Upload APK
        uses: actions/upload-artifact@v4 # <-- AQUÍ ESTABA EL ERROR (Cambiado de v3 a v4)
        with:
          name: SOPSoft-Mod-Menu-V4.7
          path: build/apk/*.apk