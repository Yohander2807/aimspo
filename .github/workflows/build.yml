name: Build SOPSoft RED APK
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # Actualizado a la versión que Flet te pidió en el log de error
          flutter-version: '3.22.0' 

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install flet

      - name: Build APK
        run: |
          # El comando 'yes' responde automáticamente "y" a la pregunta de instalación
          yes | flet build apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SOPSoft-Red-V4.7.2-Final
          path: build/apk/*.apk